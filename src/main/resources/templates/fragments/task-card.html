<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="taskCard(task, statuses)">
    <div class="flex items-start justify-between gap-3">
        <strong class="font-display text-base font-bold leading-6 tracking-tight break-all" th:text="${task.title}"></strong>
        <span class="shrink-0 text-xs font-medium text-slate-500" th:text="${#temporals.format(task.createdDate, 'dd MMM yyyy HH:mm')}"></span>
    </div>

    <p class="mt-2 whitespace-pre-wrap text-xs leading-5 text-slate-600" th:if="${task.description}" th:text="${task.description}"></p>

    <form class="mt-3 flex items-center gap-2" method="post" th:action="@{'/tasks/' + ${task.id} + '/status'}">
        <label class="sr-only" th:for="${'status-' + task.id}">Status</label>
        <select class="min-w-0 flex-1 rounded-2xl border-slate-200 py-2 text-xs focus:border-[#c95500] focus:ring-[#c95500]"
                name="status"
                th:id="${'status-' + task.id}">
            <option
                th:each="status : ${statuses}"
                th:value="${status}"
                th:selected="${status == task.status}"
                th:text="${status == T(com.tuandev.todoapp.domain.enumeration.TaskStatus).PENDING ? 'Pending' : (status == T(com.tuandev.todoapp.domain.enumeration.TaskStatus).IN_PROGRESS ? 'In Progress' : 'Completed')}"
            ></option>
        </select>
        <button class="rounded-2xl bg-[#c95500] px-4 py-2.5 text-xs font-semibold text-white transition hover:bg-[#a74400]" type="submit">Move</button>
    </form>

    <form class="mt-3 space-y-3" method="post" th:action="@{'/tasks/' + ${task.id} + '/edit'}">
        <label class="block">
            <span class="mb-1.5 block text-xs font-semibold text-slate-700">Edit title</span>
            <input class="w-full rounded-2xl border-slate-200 py-2.5 text-xs focus:border-[#c95500] focus:ring-[#c95500]"
                   name="title"
                   th:value="${task.title}"
                   type="text">
        </label>
        <label class="block">
            <span class="mb-1.5 block text-xs font-semibold text-slate-700">Edit description</span>
            <textarea class="w-full rounded-2xl border-slate-200 py-2.5 text-xs focus:border-[#c95500] focus:ring-[#c95500]"
                      name="description"
                      rows="3"
                      th:text="${task.description}"></textarea>
        </label>
        <div class="flex items-center justify-between gap-3">
            <button class="rounded-2xl bg-[#c95500] px-4 py-2.5 text-xs font-semibold text-white transition hover:bg-[#a74400]" type="submit">Save</button>
        </div>
    </form>

    <form class="mt-2" method="post" th:action="@{'/tasks/' + ${task.id} + '/delete'}">
        <button class="p-0 text-xs font-medium text-[#b84d16] underline underline-offset-2" type="submit">Delete task</button>
    </form>
</th:block>
</body>
</html>
